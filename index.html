<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Found Signal — A Found Poetry Machine</title>
  <meta name="description" content="A found poetry machine built from Project Hail Mary by Andy Weir. Select words, build a poem, add your voice to the wall.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAF8F4; --bg2: #F2EDE5; --bg3: #EAE3D8;
      --text: #1C1713; --text2: #5A5047; --text3: #9C8E81;
      --border: rgba(92,70,52,0.15); --border2: rgba(92,70,52,0.28);
      --coral: #993C1D; --coral-lt: #FAECE7; --coral-mid: #F5C4B3;
      --rad-md: 6px; --rad-lg: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1612; --bg2: #231E19; --bg3: #2C2520;
        --text: #F0EBE3; --text2: #B0A090; --text3: #6E6055;
        --border: rgba(240,220,200,0.1); --border2: rgba(240,220,200,0.2);
        --coral: #D4633A; --coral-lt: #2C1A10; --coral-mid: #7A3520;
      }
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; min-height: 100vh; }
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; flex-direction: column; }
    /* ENTRY PAGE */
    #page-entry { align-items: center; justify-content: center; }
    .entry-inner { width: 100%; max-width: 560px; margin: auto; padding: 4rem 2rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; }
    .entry-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text3); margin-bottom: 2.5rem; }
    .entry-title { font-family: 'Playfair Display', serif; font-size: clamp(40px, 10vw, 64px); font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; margin-bottom: 0.3rem; }
    .entry-slash { color: var(--coral); font-style: italic; }
    .entry-rule { width: 36px; height: 0.5px; background: var(--border2); margin: 2rem auto; }
    .entry-verse { font-size: 16px; font-style: italic; line-height: 2.3; color: var(--text2); margin-bottom: 3rem; }
    .entry-verse em { color: var(--coral); font-style: normal; }
    .btn-primary { font-family: 'Lora', serif; font-size: 13px; letter-spacing: 0.08em; padding: 11px 32px; border: 0.5px solid var(--coral); border-radius: var(--rad-md); background: transparent; color: var(--coral); cursor: pointer; transition: background 0.2s, color 0.2s; margin-bottom: 1rem; }
    .btn-primary:hover { background: var(--coral); color: var(--coral-lt); }
    .btn-ghost { font-family: 'Lora', serif; font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; font-style: italic; transition: color 0.2s; }
    .btn-ghost:hover { color: var(--coral); }
    .entry-footer { width: 100%; padding: 1.5rem 2rem; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 0.75rem; margin-top: auto; }
    .entry-footer-cite, .entry-footer-theory { font-size: 11px; color: var(--text3); font-style: italic; line-height: 1.7; }
    .entry-footer-theory { text-align: right; }
  </style>
</head>
<body>
  <div class="page active" id="page-entry">
    <div class="entry-inner">
      <div class="entry-eyebrow">A found poetry machine</div>
      <div class="entry-title">Found <span class="entry-slash">Signal</span></div>
      <div class="entry-rule"></div>
      <div class="entry-verse">
        somewhere in this data<br>
        was a <em>pattern</em><br>
        a signal buried in noise<br>
        <br>
        what do you hear<br>
        when you listen?
      </div>
      <button class="btn-primary" onclick="window.location='Drift.html'">enter Drift →</button>
      <button class="btn-ghost" onclick="window.location='Noise.html'">or explore Noise →</button>
    </div>
    <div class="entry-footer">
      <div class="entry-footer-cite">
        Source: Weir, A. (2021).<br>
        <em>Project Hail Mary.</em> Ballantine Books. p. 47.
      </div>
      <div class="entry-footer-theory">
        After Hocks (2003) &amp; Bolter (2001)<br>
        on visual rhetoric &amp; remediation
      </div>
    </div>
  </div>
</body>
</html>
