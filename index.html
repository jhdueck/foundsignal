<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Poems</title>
  <style>
    :root {
      --bg: #fefefe;
      --text: #222;
      --text2: #555;
      --text3: #888;
      --accent: #0077cc;
    }

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 3rem;
    }

    header .subline {
      font-size: 0.9rem;
      color: var(--text3);
      font-style: italic;
      margin-top: 0.5rem;
    }

    .mode-nav {
      font-size: 0.85rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .mode-nav a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 0.5rem;
    }

    .wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      padding: 1rem 2rem;
    }

    .wall-card {
      background: #fff;
      border: 1px solid #eee;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .wall-card-poem {
      margin: 0;
      white-space: pre-line;
      line-height: 1.5;
    }

    .author {
      font-size: 0.85rem;
      text-align: right;
      color: var(--text2);
      margin-top: 0.5rem;
    }

    .machine-instruction {
      font-size: 0.9rem;
      color: var(--text3);
      margin-top: 1rem;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <h1>Signal Poems</h1>
    <div class="subline">original poems — structured and complete</div>
    <div class="mode-nav">
      viewing mode:
      <a href="index.html">signal</a> ·
      <a href="noise.html">noise</a> ·
      <a href="drift.html">drift</a>
    </div>
  </header>

  <main>
    <div class="wall" id="poem-wall">
      <!-- Poem cards will be injected here by JavaScript -->
    </div>
  </main>

  <script>
    // Example database reference
    const poems = [
      { text: `The sun drifts low,\nShadows stretch long,\nSilence holds the field.`, author: 'Alice' },
      { text: `Rain taps the window,\nA soft, steady rhythm,\nThoughts wander far.`, author: 'Bob' },
      { text: `Night folds itself,\nStars blink awake slowly,\nDreams stir quietly.`, author: 'Charlie' }
      // Add more poems as needed
    ];

    const wall = document.getElementById('poem-wall');

    poems.forEach(poem => {
      const card = document.createElement('div');
      card.className = 'wall-card';

      const poemText = document.createElement('p');
      poemText.className = 'wall-card-poem';
      poemText.textContent = poem.text;

      const author = document.createElement('div');
      author.className = 'author';
      author.textContent = `— ${poem.author}`;

      card.appendChild(poemText);
      card.appendChild(author);
      wall.appendChild(card);
    });
  </script>
</body>
</html>
