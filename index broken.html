<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Poetry Wall — Signal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* optional inline splash styling for Signal */
    .splash.signal {
      background-color: #f0f0f0;
      padding: 2rem;
      text-align: center;
    }
    .splash.signal h1 {
      margin: 0 0 1rem 0;
      font-size: 3rem;
    }
    .splash.signal p {
      font-size: 1.2rem;
      color: #333;
    }
  </style>
</head>
<body>
  <header class="splash signal">
    <h1>Signal</h1>
    <p>Welcome to the Signal wall. Create a poem using the original text. Your words appear exactly as you write them.</p>
  </header>

  <main>
    <div id="poem-wall"></div>
    <textarea id="poem-input" placeholder="Write your poem here..."></textarea>
    <button id="submit-poem">Submit</button>
  </main>

  <script>
    const poemWall = document.getElementById('poem-wall');
    const input = document.getElementById('poem-input');
    const button = document.getElementById('submit-poem');

    // Reference your existing database
    let poems = []; // replace with actual database fetch if needed

    function displayPoem(text) {
      const p = document.createElement('p');
      p.textContent = text;
      poemWall.appendChild(p);
    }

    button.addEventListener('click', () => {
      const text = input.value.trim();
      if(text){
        poems.push(text); // Save to database
        displayPoem(text);
        input.value = '';
      }
    });

    // Optionally display existing poems on load
    poems.forEach(displayPoem);
  </script>
</body>
</html>
